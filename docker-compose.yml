secrets:
  alpaca_api_key:
    file: ./secrets/alpaca_api_key
  alpaca_secret_key:
    file: ./secrets/alpaca_secret_key
  polygon_api_key:
    file: ./secrets/polygon_api_key
  smtp_password:
    file: ./secrets/smtp_password

services:
  # Admin API
  admin-api:
    build: .
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "${ADMIN_API_PORT:-8000}:8000"
    secrets:
      - alpaca_api_key
      - alpaca_secret_key
      - polygon_api_key
      - smtp_password
    environment:
      - ARCTICDB_URI=lmdb://data/arctic/
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - DAGSTER_GRAPHQL_URL=http://dagster:3000/graphql
      - ALPACA_BASE_URL=${ALPACA_BASE_URL:-https://paper-api.alpaca.markets}
      - MLCOUNCIL_AUTO_EXECUTE=${MLCOUNCIL_AUTO_EXECUTE:-false}
      - MLCOUNCIL_MAX_DAILY_ORDERS=${MLCOUNCIL_MAX_DAILY_ORDERS:-20}
      - MLCOUNCIL_MAX_TURNOVER=${MLCOUNCIL_MAX_TURNOVER:-0.30}
      - MLCOUNCIL_MAX_POSITION_SIZE=${MLCOUNCIL_MAX_POSITION_SIZE:-0.10}
    env_file:
      - path: .env
        required: true
    volumes:
      - ./data:/app/data
      - ./config:/app/config
    depends_on:
      mlflow:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # Streamlit Dashboard
  dashboard:
    build: .
    ports:
      - "${DASHBOARD_PORT:-8501}:8501"
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
    command: streamlit run dashboard/app.py --server.port 8501 --server.address 0.0.0.0
    volumes:
      - ./data:/app/data
      - ./config:/app/config
    depends_on:
      admin-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # Dagster Pipeline (optional)
  dagster:
    build: .
    ports:
      - "${DAGSTER_PORT:-3000}:3000"
    command:
      - sh
      - -c
      - mkdir -p /app/data/dagster && touch /app/data/dagster/dagster.yaml && dagster dev -f data/pipeline.py -h 0.0.0.0 -p 3000
    volumes:
      - ./data:/app/data
      - ./config:/app/config
    secrets:
      - alpaca_api_key
      - alpaca_secret_key
    env_file:
      - path: .env
        required: true
    environment:
      - ARCTICDB_URI=lmdb://data/arctic/
      - DAGSTER_HOME=/app/data/dagster
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - ALPACA_BASE_URL=${ALPACA_BASE_URL:-https://paper-api.alpaca.markets}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/server_info"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # MLflow Tracking (optional)
  mlflow:
    build: .
    ports:
      - "${MLFLOW_PORT:-5000}:5000"
    command:
      - sh
      - -c
      - python scripts/patch_mlflow_assistant.py && python -m mlflow db upgrade sqlite:///mlflow.db && python -m mlflow server --workers 1 --host 0.0.0.0 --port 5000 --allowed-hosts "*" --backend-store-uri sqlite:///mlflow.db --default-artifact-root ./mlruns --static-prefix /mlflow
    environment:
      MLFLOW_ASSISTANT_ALLOW_PRIVATE_NETWORK: "true"
    volumes:
      - ./mlruns:/app/mlruns
      - ./mlflow.db:/app/mlflow.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/mlflow/"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  intraday-supervisor:
    build: .
    command: python scripts/run_intraday_supervisor.py
    secrets:
      - alpaca_api_key
      - alpaca_secret_key
      - polygon_api_key
    environment:
      - ARCTICDB_URI=lmdb://data/arctic/
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - ALPACA_BASE_URL=${ALPACA_BASE_URL:-https://paper-api.alpaca.markets}
      - MLCOUNCIL_ENV_PROFILE=${MLCOUNCIL_ENV_PROFILE:-paper}
      - MLCOUNCIL_INTRADAY_INTERVAL_MINUTES=${MLCOUNCIL_INTRADAY_INTERVAL_MINUTES:-15}
      - MLCOUNCIL_INTRADAY_UNIVERSE=${MLCOUNCIL_INTRADAY_UNIVERSE:-AAPL,MSFT,NVDA,AMZN,META,GOOGL,TSLA}
      - MLCOUNCIL_INTRADAY_AGENT_PROVIDER=${MLCOUNCIL_INTRADAY_AGENT_PROVIDER:-rule-based}
      - MLCOUNCIL_INTRADAY_LOG_TO_MLFLOW=${MLCOUNCIL_INTRADAY_LOG_TO_MLFLOW:-false}
      - MLCOUNCIL_AUTOMATION_PAUSED=${MLCOUNCIL_AUTOMATION_PAUSED:-false}
    env_file:
      - path: .env
        required: true
    volumes:
      - ./data:/app/data
      - ./config:/app/config
      - ./mlruns:/app/mlruns
      - ./mlflow.db:/app/mlflow.db
    depends_on:
      mlflow:
        condition: service_healthy
    restart: unless-stopped

volumes:
  data:
