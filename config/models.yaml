lgbm:
  n_estimators: 500
  learning_rate: 0.05
  num_leaves: 64
  min_child_samples: 20
  subsample: 0.8
  colsample_bytree: 0.7
  reg_alpha: 0.1
  reg_lambda: 0.1
  n_jobs: -1
  random_state: 42
  verbose: -1

cpcv:
  n_splits: 6
  embargo_days: 5
  n_test_folds: 2

hmm:
  n_states: 3
  n_iter: 100
  covariance_type: full
  random_state: 42

sentiment:
  model_name: "ProsusAI/finbert"
  fallback_model: "yiyanghkust/finbert-tone"
  recency_decay: 0.7          # gamma: day-1 weight=1.0, day-2=0.7, day-3=0.49
  batch_size: 32
  max_length: 512             # FinBERT token-limit proxy (chars)
