# Historical universe membership for survivorship-bias-free backtesting.
#
# Each ticker has an 'added' date (when it entered the tradable universe)
# and an optional 'removed' date.  If 'removed' is absent, the ticker is
# still an active member.
#
# IMPORTANT: Update this file whenever the universe changes so that
# backtests running over past dates only include tickers that were
# actually tradable at that point in time.
#
# Dates approximate the IPO / listing date for mid-cap names;
# large-caps are set to the pipeline start date (2018-01-01).

membership:
  # Large cap (all present since pipeline inception)
  AAPL:
    added: "2018-01-01"
  MSFT:
    added: "2018-01-01"
  GOOGL:
    added: "2018-01-01"
  AMZN:
    added: "2018-01-01"
  META:
    added: "2018-01-01"
  NVDA:
    added: "2018-01-01"

  # Mid cap (added around their IPO / listing dates)
  ETSY:
    added: "2018-01-01"
  DOCU:
    added: "2018-04-27"
