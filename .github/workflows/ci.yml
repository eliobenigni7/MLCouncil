name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - "codex/**"

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run test suite
        run: python -m pytest

      - name: Smoke import Dagster definitions
        run: python -c "from data.pipeline import defs; print(defs.get_job_def('daily_pipeline').name)"

      - name: Build Docker image
        run: docker build -t mlcouncil-ci .
